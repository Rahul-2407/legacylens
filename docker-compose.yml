services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: legacylens
      POSTGRES_PASSWORD: legacylens
      POSTGRES_DB: legacylens
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legacylens"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment: &app_env
      LEGACYLENS_DATABASE_URL: postgresql+psycopg2://legacylens:legacylens@postgres:5432/legacylens
      LEGACYLENS_REDIS_URL: redis://redis:6379/0
      LEGACYLENS_GROQ_API_KEY: ${LEGACYLENS_GROQ_API_KEY:-}
      LEGACYLENS_NEO4J_URI: bolt://neo4j:7687
    ports:
      - "8000:8000"
    volumes:
      - appdata:/data          # uploads shared with the worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["celery", "-A", "legacylens.service.tasks", "worker",
              "--loglevel=info", "--concurrency=2"]
    environment: *app_env
    volumes:
      - appdata:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build: .
    command: ["streamlit", "run", "dashboard/app.py",
              "--server.address=0.0.0.0", "--server.port=8501",
              "--server.headless=true"]
    environment:
      LEGACYLENS_API_URL: http://api:8000
      PYTHONPATH: /app
    ports:
      - "8501:8501"
    depends_on:
      - api

  neo4j:
    image: neo4j:5
    profiles: ["graph"]
    environment:
      NEO4J_AUTH: neo4j/legacylens
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  appdata:
  neo4jdata: